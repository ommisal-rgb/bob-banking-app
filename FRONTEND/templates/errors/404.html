{% extends "base.html" %}
{% block title %}Page Not Found{% endblock %}

{% block content %}
<div class="container py-5 text-center">
  <div class="display-1 text-muted fw-bold mb-2">404</div>
  <h2 class="h4 fw-semibold mb-3">Page Not Found</h2>
  <p class="text-muted mb-4">The page you are looking for does not exist or has been moved.</p>
  <a href="{{ url_for('dashboard.dashboard') }}" class="btn btn-primary">
    <i class="bi bi-house me-1"></i>Go to Dashboard
  </a>
</div>
{% endblock %}
