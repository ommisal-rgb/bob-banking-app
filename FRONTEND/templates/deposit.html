{% extends "base.html" %}
{% block title %}Deposit{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-10 col-md-6 col-lg-5 col-xl-4">

      <div class="card border-0 shadow-sm">
        <div class="card-body p-4 p-md-5">

          <div class="text-center mb-4">
            <div class="display-5 text-success mb-2">
              <i class="bi bi-arrow-down-circle-fill"></i>
            </div>
            <h1 class="h4 fw-semibold text-dark">Deposit Funds</h1>
            <p class="text-muted small mb-0">Enter the amount you wish to deposit.</p>
          </div>

          <form method="POST" action="{{ url_for('transactions.deposit_route') }}" novalidate>

            <div class="mb-4">
              <label for="amount" class="form-label fw-medium">Amount (£)</label>
              <div class="input-group input-group-lg">
                <span class="input-group-text bg-light fw-bold">£</span>
                <input
                  type="number"
                  id="amount"
                  name="amount"
                  class="form-control"
                  placeholder="0.00"
                  value="{{ amount | default('') }}"
                  step="0.01"
                  min="0.01"
                  max="1000000"
                  required
                  autofocus
                >
              </div>
              <div class="form-text text-muted">
                Minimum: £0.01 &nbsp;|&nbsp; Maximum: £1,000,000.00
              </div>
            </div>

            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-success btn-lg">
                <i class="bi bi-arrow-down-circle me-2"></i>Deposit
              </button>
              <a href="{{ url_for('dashboard.dashboard') }}" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left me-1"></i>Back to Dashboard
              </a>
            </div>

          </form>

        </div>
      </div>

    </div>
  </div>
</div>
{% endblock %}
