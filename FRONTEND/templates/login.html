{% extends "base.html" %}
{% block title %}Sign In{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-10 col-md-6 col-lg-5 col-xl-4">

      <!-- Card -->
      <div class="card shadow-sm border-0">
        <div class="card-body p-4 p-md-5">

          <!-- Logo / heading -->
          <div class="text-center mb-4">
            <div class="display-5 text-primary mb-2">
              <i class="bi bi-bank2"></i>
            </div>
            <h1 class="h4 fw-semibold text-dark">Welcome back</h1>
            <p class="text-muted small mb-0">Sign in to your SecureBank account</p>
          </div>

          <!-- Login form -->
          <form method="POST" action="{{ url_for('auth.login') }}" novalidate>

            <div class="mb-3">
              <label for="username" class="form-label fw-medium">Username</label>
              <div class="input-group">
                <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                <input
                  type="text"
                  id="username"
                  name="username"
                  class="form-control"
                  placeholder="Enter your username"
                  value="{{ username | default('') }}"
                  required
                  autocomplete="username"
                  autofocus
                >
              </div>
            </div>

            <div class="mb-4">
              <label for="password" class="form-label fw-medium">Password</label>
              <div class="input-group">
                <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
                <input
                  type="password"
                  id="password"
                  name="password"
                  class="form-control"
                  placeholder="Enter your password"
                  required
                  autocomplete="current-password"
                >
              </div>
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-primary btn-lg">
                <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
              </button>
            </div>

          </form>

          <p class="text-center text-muted small mt-4 mb-0">
            Demo credentials: <code>admin</code> / <code>password123</code>
          </p>

        </div>
      </div>

    </div>
  </div>
</div>
{% endblock %}
